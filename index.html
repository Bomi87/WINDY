<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windy airport weather check</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 24px;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      position: relative;
    }

    h2 {
      margin-top: 0;
      color: #1f2937;
      font-size: 22px;
    }

    label {
      display: block;
      margin-top: 16px;
      font-weight: bold;
      color: #374151;
    }

    input {
      width: 100%;
      height: 52px;
      display: block;
      padding: 12px;
      margin-top: 6px;
      font-size: 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      box-sizing: border-box;
      background: #ffffff;
    }

    .field {
      width: 70%;
    }

    .date-time-row {
      width: 70%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: start;
    }

    .date-time-row .field {
      width: 100%;
      min-width: 0;
    }

    .date-time-help {
      width: 70%;
      margin-top: 8px;
    }

    button {
      width: 35%;
      display: block;
      margin: 22px auto 0 auto;
      padding: 13px;
      font-size: 16px;
      font-weight: bold;
      background: #6b7280;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #4b5563;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    #localDate,
    #localTime,
    .calendar-day,
    .calendar-header button,
    #openBtn,
    .schedule-apply-btn {
      touch-action: manipulation;
    }

    .error {
      color: #dc2626;
      font-weight: bold;
      margin-top: 16px;
    }

    .small {
      font-size: 13px;
      color: #6b7280;
      margin-top: 6px;
    }

    a {
      color: #2563eb;
      font-weight: bold;
    }

    .calendar-popup {
      display: none;
      position: absolute;
      z-index: 9999;
      width: 280px;
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      padding: 12px;
      box-sizing: border-box;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-weight: bold;
      color: #111827;
    }

    .calendar-header button {
      width: 36px;
      height: 32px;
      margin: 0;
      padding: 0;
      border-radius: 6px;
      font-size: 16px;
      background: #eef2ff;
      color: #111827;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      text-align: center;
      font-size: 13px;
    }

    .calendar-day-name {
      font-weight: bold;
      color: #6b7280;
      padding: 6px 0;
    }

    .calendar-day {
      padding: 8px 0;
      border-radius: 6px;
      cursor: pointer;
      color: #111827;
      user-select: none;
      -webkit-user-select: none;
    }

    .calendar-day:hover {
      background: #dbeafe;
    }

    .calendar-day.empty {
      cursor: default;
      background: transparent;
    }

    .calendar-day.selected {
      background: #2563eb;
      color: white;
      font-weight: bold;
    }

    .selected-schedule-box {
      width: 70%;
      margin: 18px auto 0 auto;
      padding: 14px;
      background: #f3f4f6;
      border-radius: 10px;
      box-sizing: border-box;
      min-height: 86px;
      display: none;
    }

    .selected-schedule-title {
      font-weight: bold;
      margin-bottom: 8px;
      color: #111827;
      font-size: 15px;
    }

    .selected-schedule-text {
      font-size: 14px;
      color: #111827;
      line-height: 1.7;
    }

    .schedule-box {
      width: 70%;
      margin: 22px auto 0 auto;
      padding: 14px;
      background: #f3f4f6;
      border-radius: 10px;
      box-sizing: border-box;
    }

    .schedule-title {
      font-weight: bold;
      margin-bottom: 10px;
      color: #111827;
      font-size: 15px;
    }

    .schedule-aircraft-title {
      font-weight: bold;
      margin: 12px 0 6px 0;
      font-size: 14px;
      color: #7c3aed;
    }

    .aircraft-title-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .aircraft-icon {
      font-size: 16px;
      line-height: 1;
    }

    .schedule-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 6px 0;
      padding: 10px 12px;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 8px;
    }

    .schedule-row.active {
      border: 2px solid #2563eb;
      background: #eef4ff;
    }

    .schedule-text {
      flex: 1;
      min-width: 0;
      color: #111827;
      font-size: 13px;
      font-weight: bold;
      line-height: 1.4;
      word-break: break-word;
    }

    .schedule-type-badge {
      display: inline-block;
      min-width: 38px;
      text-align: center;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
      color: white;
      margin-right: 6px;
    }

    .schedule-type-badge.dep {
      background: #2563eb;
    }

    .schedule-type-badge.arr {
      background: #16a34a;
    }

    .schedule-apply-btn {
      width: auto;
      min-width: 64px;
      margin: 0;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: bold;
      background: #6b7280;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .schedule-apply-btn:hover {
      background: #4b5563;
    }

    .schedule-empty {
      font-size: 13px;
      color: #6b7280;
      padding: 4px 0;
    }

    @media (max-width: 520px) {
      body {
        padding: 12px;
      }

      .container {
        padding: 18px;
      }

      .field,
      .date-time-row,
      .date-time-help,
      .selected-schedule-box,
      .schedule-box,
      button {
        width: 100%;
      }

      .date-time-row {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      input {
        height: 52px;
        font-size: 15px;
        padding: 11px;
      }

      .calendar-popup {
        width: calc(100% - 36px);
        left: 18px !important;
      }

      .schedule-row {
        gap: 8px;
        padding: 10px;
      }

      .schedule-text {
        font-size: 12px;
      }

      .schedule-apply-btn {
        min-width: 58px;
        padding: 8px 10px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Windy airport weather check</h2>

    <div id="inputSection">
      <div class="field">
        <label for="icao">Airport ICAO</label>
        <input id="icao" type="text" placeholder="예: KPIT" maxlength="4" />
      </div>

      <div class="date-time-row">
        <div class="field">
          <label for="localDate">Local Date</label>
          <input
            id="localDate"
            type="text"
            placeholder="YYYY-MM-DD"
            maxlength="10"
            inputmode="numeric"
            readonly
          />
        </div>

        <div class="field">
          <label for="localTime">Local Time</label>
          <input
            id="localTime"
            type="tel"
            placeholder="예: 23:40"
            maxlength="5"
            inputmode="numeric"
            autocomplete="off"
          />
        </div>
      </div>

      <div class="small date-time-help">날짜는 입력창 클릭 후 선택 / 시간은 24시간 형식 ex) 23:40</div>

      <button id="openBtn" onclick="generateWindyLink()">OPEN</button>
    </div>

    <div id="error" class="error"></div>

    <div id="selectedScheduleBox" class="selected-schedule-box">
      <div class="selected-schedule-title">Selected Schedule</div>
      <div id="selectedScheduleContent" class="selected-schedule-text"></div>
    </div>

    <div id="scheduleBox" class="schedule-box">
      <div class="schedule-title">Schedule</div>
      <div id="scheduleContent" class="schedule-content">스케줄 불러오는 중...</div>
    </div>

    <div id="calendarPopup" class="calendar-popup">
      <div class="calendar-header">
        <button type="button" onclick="changeMonth(-1)">‹</button>
        <span id="calendarTitle"></span>
        <button type="button" onclick="changeMonth(1)">›</button>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyFn07IdcMuFSOswozUJtPyDZHxs-JC2s53mGCfpudUqq81Nhl-lhz_ikvgZwm9Y0FLmQ/exec";

    let currentCalendarDate = new Date();
    let suppressSelectionClear = false;

    function pad2(n) {
      return String(n).padStart(2, "0");
    }

    function formatYmd(date) {
      return date.getFullYear() + "-" + pad2(date.getMonth() + 1) + "-" + pad2(date.getDate());
    }

    function clearSelectedSchedule() {
      if (suppressSelectionClear) return;

      const selectedBox = document.getElementById("selectedScheduleBox");
      const selectedContent = document.getElementById("selectedScheduleContent");

      selectedBox.style.display = "none";
      selectedContent.innerHTML = "";

      document.querySelectorAll(".schedule-row").forEach(function(row) {
        row.classList.remove("active");
      });
    }

    function scrollToInputSection() {
      const target = document.getElementById("inputSection");

      if (target) {
        target.scrollIntoView({
          behavior: "smooth",
          block: "start"
        });
      }
    }

    function openCalendar() {
      const input = document.getElementById("localDate");
      const popup = document.getElementById("calendarPopup");

      const value = input.value.trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(value)) {
        const parts = value.split("-").map(Number);
        currentCalendarDate = new Date(parts[0], parts[1] - 1, parts[2]);
      }

      renderCalendar();

      const rect = input.getBoundingClientRect();
      const containerRect = document.querySelector(".container").getBoundingClientRect();

      popup.style.left = (rect.left - containerRect.left) + "px";
      popup.style.top = (rect.bottom - containerRect.top + 6) + "px";
      popup.style.display = "block";
    }

    function closeCalendar() {
      document.getElementById("calendarPopup").style.display = "none";
    }

    function changeMonth(diff) {
      currentCalendarDate.setMonth(currentCalendarDate.getMonth() + diff);
      renderCalendar();
    }

    function renderCalendar() {
      const year = currentCalendarDate.getFullYear();
      const month = currentCalendarDate.getMonth();

      document.getElementById("calendarTitle").textContent = year + "-" + pad2(month + 1);

      const grid = document.getElementById("calendarGrid");
      grid.innerHTML = "";

      const dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      dayNames.forEach(function (name) {
        const div = document.createElement("div");
        div.className = "calendar-day-name";
        div.textContent = name;
        grid.appendChild(div);
      });

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();
      const selectedValue = document.getElementById("localDate").value;

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement("div");
        empty.className = "calendar-day empty";
        grid.appendChild(empty);
      }

      for (let day = 1; day <= lastDate; day++) {
        const date = new Date(year, month, day);
        const ymd = formatYmd(date);

        const div = document.createElement("div");
        div.className = "calendar-day";
        if (ymd === selectedValue) div.classList.add("selected");

        div.textContent = day;

        div.addEventListener("pointerdown", function (event) {
          event.preventDefault();
          event.stopPropagation();

          document.getElementById("localDate").value = ymd;
          closeCalendar();
          clearSelectedSchedule();
        }, { passive: false });

        grid.appendChild(div);
      }
    }

    async function loadSchedules() {
      const box = document.getElementById("scheduleContent");

      try {
        const response = await fetch(APPS_SCRIPT_URL + "?action=schedules");
        const data = await response.json();

        if (!data.success) {
          box.innerHTML = `<div class="schedule-empty">스케줄을 불러오지 못했습니다.</div>`;
          return;
        }

        renderSchedules(data.schedules);

      } catch (err) {
        box.innerHTML = `<div class="schedule-empty">스케줄 연결 오류: ${err.message}</div>`;
      }
    }

    function renderSchedules(schedules) {
      const box = document.getElementById("scheduleContent");
      box.innerHTML = "";

      const aircraftList = ["ACJ", "G650"];

      aircraftList.forEach(function(aircraft) {
        const items = schedules[aircraft] || [];

        const icon = aircraft === "ACJ" ? "✈️" : "🛩️";

        const title = document.createElement("div");
        title.className = "schedule-aircraft-title " + aircraft.toLowerCase();
        title.innerHTML = `
          <span class="aircraft-title-wrap">
            <span class="aircraft-icon">${icon}</span>
            <span>${aircraft}</span>
          </span>
        `;
        box.appendChild(title);

        if (!items.length) {
          const empty = document.createElement("div");
          empty.className = "schedule-empty";
          empty.textContent = "스케줄 없음";
          box.appendChild(empty);
          return;
        }

        items.forEach(function(item) {
          const row = document.createElement("div");
          row.className = "schedule-row";

          const text = document.createElement("div");
          text.className = "schedule-text";

          const badge = document.createElement("span");
          badge.className = "schedule-type-badge " + item.type.toLowerCase();
          badge.textContent = item.type;

          const labelText = document.createElement("span");
          labelText.textContent =
            item.airport + " / " +
            item.localDate + " " +
            item.localTime;

          text.appendChild(badge);
          text.appendChild(labelText);

          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "schedule-apply-btn";
          btn.textContent = "선택";

          btn.addEventListener("click", function(event) {
            event.preventDefault();
            event.stopPropagation();
            applySchedule(item, row);
          });

          row.appendChild(text);
          row.appendChild(btn);
          box.appendChild(row);
        });
      });
    }

    function applySchedule(item, selectedRow) {
      suppressSelectionClear = true;

      document.getElementById("icao").value = item.airport;
      document.getElementById("localDate").value = item.localDate;
      document.getElementById("localTime").value = item.localTime;
      document.getElementById("error").textContent = "";

      suppressSelectionClear = false;

      updateSelectedScheduleDisplay(item);

      document.querySelectorAll(".schedule-row").forEach(function(row) {
        row.classList.remove("active");
      });

      if (selectedRow) {
        selectedRow.classList.add("active");
      }

      setTimeout(scrollToInputSection, 80);
    }

    function updateSelectedScheduleDisplay(item) {
      const selectedBox = document.getElementById("selectedScheduleBox");
      const box = document.getElementById("selectedScheduleContent");

      selectedBox.style.display = "block";

      box.innerHTML = `
        <strong>Aircraft:</strong> ${item.aircraft}<br>
        <strong>Airport:</strong> ${item.airport}<br>
        <strong>Type:</strong> ${item.type}<br>
        <strong>Local Time:</strong> ${item.localDate} ${item.localTime}
      `;
    }

    async function generateWindyLink() {
      const icaoInput = document.getElementById("icao");
      const dateInput = document.getElementById("localDate");
      const timeInput = document.getElementById("localTime");
      const button = document.getElementById("openBtn");
      const errorBox = document.getElementById("error");

      errorBox.textContent = "";

      const icao = icaoInput.value.trim().toUpperCase();
      const localDate = dateInput.value.trim();
      const localTime = timeInput.value.trim();

      if (!icao) {
        errorBox.textContent = "공항 ICAO를 입력하세요.";
        return;
      }

      if (icao.length !== 4) {
        errorBox.textContent = "ICAO 코드는 4자리로 입력하세요. 예: KPIT";
        return;
      }

      if (!localDate) {
        errorBox.textContent = "Local Date를 선택하세요.";
        return;
      }

      if (!/^\d{4}-\d{2}-\d{2}$/.test(localDate)) {
        errorBox.textContent = "Local Date 형식이 올바르지 않습니다.";
        return;
      }

      if (!localTime) {
        errorBox.textContent = "Local Time을 입력하세요.";
        return;
      }

      if (!/^([01]\d|2[0-3]):[0-5]\d$/.test(localTime)) {
        errorBox.textContent = "Local Time은 24시간 형식 HH:mm으로 입력하세요. 예: 03:00, 14:30, 23:40";
        return;
      }

      button.disabled = true;
      button.textContent = "처리 중...";

      try {
        const apiUrl =
          APPS_SCRIPT_URL +
          "?icao=" + encodeURIComponent(icao) +
          "&localDate=" + encodeURIComponent(localDate) +
          "&localTime=" + encodeURIComponent(localTime);

        const response = await fetch(apiUrl);
        const data = await response.json();

        if (!data.success) {
          errorBox.textContent = data.message || "Windy 링크 생성에 실패했습니다.";
          return;
        }

        window.open(data.windyUrl, "_blank");

      } catch (err) {
        errorBox.textContent = "Apps Script 연결 중 오류가 발생했습니다: " + err.message;
      } finally {
        button.disabled = false;
        button.textContent = "OPEN";
      }
    }

    const localDateInput = document.getElementById("localDate");

    localDateInput.addEventListener("pointerdown", function (event) {
      event.preventDefault();
      event.stopPropagation();
      openCalendar();
    }, { passive: false });

    document.getElementById("icao").addEventListener("input", function () {
      this.value = this.value.toUpperCase();
      clearSelectedSchedule();
    });

    document.getElementById("localTime").addEventListener("input", function () {
      let v = this.value.replace(/[^0-9]/g, "");

      if (v.length >= 3) {
        v = v.slice(0, 2) + ":" + v.slice(2, 4);
      }

      this.value = v.slice(0, 5);
      clearSelectedSchedule();
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();

        const button = document.getElementById("openBtn");

        if (!button.disabled) {
          generateWindyLink();
        }
      }
    });

    document.addEventListener("pointerdown", function (event) {
      const popup = document.getElementById("calendarPopup");
      const dateInput = document.getElementById("localDate");

      if (
        popup.style.display === "block" &&
        !popup.contains(event.target) &&
        event.target !== dateInput
      ) {
        closeCalendar();
      }
    });

    loadSchedules();
  </script>
</body>
</html>
